---
- name: Install wireguard-tools
  ansible.builtin.apt:
    name: wireguard-tools
    state: present

- name: Load and persist wireguard kernel module
  community.general.modprobe:
    name: wireguard
    state: present
    persistent: present

- name: Enable IP forwarding
  ansible.posix.sysctl:
    name: net.ipv4.ip_forward
    value: "1"
    sysctl_set: true
    state: present
    reload: true
