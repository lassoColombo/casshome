---
- name: Deploy Flannel locally
  delegate_to: localhost
  become: false
  block:
    - name: Download Flannel manifest
      ansible.builtin.get_url:
        url: "https://github.com/flannel-io/flannel/releases/download/{{ k8s_flannel_version }}/kube-flannel.yml"
        dest: /tmp/kube-flannel.yml
        mode: "0644"
        force: true

    - name: Apply Flannel manifest
      kubernetes.core.k8s:
        kubeconfig: "{{ local_kubeconfig }}"
        state: present
        src: /tmp/kube-flannel.yml

    - name: Configure Flannel host-gw backend
      kubernetes.core.k8s:
        kubeconfig: "{{ local_kubeconfig }}"
        state: present
        definition:
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: kube-flannel-cfg
            namespace: kube-flannel
          data:
            net-conf.json: |
              {
                "Network": "{{ k8s_pod_cidr }}",
                "EnableNFTables": false,
                "Backend": {
                  "Type": "host-gw"
                }
              }

    - name: Restart Flannel DaemonSet to apply backend config
      kubernetes.core.k8s:
        kubeconfig: "{{ local_kubeconfig }}"
        state: patched
        kind: DaemonSet
        namespace: kube-flannel
        name: kube-flannel-ds
        definition:
          spec:
            template:
              metadata:
                annotations:
                  kubectl.kubernetes.io/restartedAt: "{{ ansible_facts['date_time']['iso8601'] }}"

    - name: Wait for Flannel DaemonSet to be ready
      ansible.builtin.command: >
        kubectl --kubeconfig {{ local_kubeconfig }}
        -n kube-flannel wait daemonset/kube-flannel-ds
        --for=jsonpath='{.status.numberReady}'=1 --timeout=300s
      changed_when: false
      register: flannel_ready
      retries: 10
      delay: 15
      until: flannel_ready.rc == 0

    - name: Wait for node to be Ready
      ansible.builtin.command: >
        kubectl --kubeconfig {{ local_kubeconfig }}
        wait node --all
        --for=condition=Ready --timeout=300s
      changed_when: false
      register: node_ready
      retries: 5
      delay: 15
      until: node_ready.rc == 0
