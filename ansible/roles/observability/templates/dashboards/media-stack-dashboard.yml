apiVersion: v1
kind: ConfigMap
metadata:
  name: media-stack-dashboard
  namespace: observability
  labels:
    grafana_dashboard: "1"
data:
  media-stack.json: |
    {% raw %}
    {
      "__inputs": [],
      "__requires": [],
      "annotations": { "list": [] },
      "editable": true,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "schemaVersion": 38,
      "style": "dark",
      "tags": ["media"],
      "time": { "from": "now-24h", "to": "now" },
      "timepicker": {},
      "timezone": "browser",
      "title": "Media Stack",
      "uid": "media-stack-auto",
      "version": 1,
      "templating": {
        "list": [
          {
            "name": "datasource",
            "type": "datasource",
            "query": "prometheus",
            "current": {},
            "hide": 0,
            "includeAll": false,
            "label": "Datasource",
            "refresh": 1
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "type": "row",
          "title": "Volume Usage",
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 }
        },
        {
          "id": 2,
          "type": "gauge",
          "title": "Disk Used %",
          "datasource": { "type": "prometheus", "uid": "VictoriaMetrics" },
          "gridPos": { "h": 8, "w": 6, "x": 0, "y": 1 },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "min": 0,
              "max": 1,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.7 },
                  { "color": "red", "value": 0.85 }
                ]
              }
            }
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "orientation": "auto",
            "showThresholdLabels": false,
            "showThresholdMarkers": true
          },
          "targets": [
            {
              "expr": "1 - node_filesystem_avail_bytes{mountpoint=\"/\", fstype!=\"tmpfs\"} / node_filesystem_size_bytes{mountpoint=\"/\", fstype!=\"tmpfs\"}",
              "legendFormat": "used",
              "refId": "A"
            }
          ]
        },
        {
          "id": 3,
          "type": "stat",
          "title": "Disk Free",
          "datasource": { "type": "prometheus", "uid": "VictoriaMetrics" },
          "gridPos": { "h": 4, "w": 6, "x": 6, "y": 1 },
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "yellow", "value": 10737418240 },
                  { "color": "green", "value": 21474836480 }
                ]
              }
            }
          },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background", "graphMode": "none" },
          "targets": [
            {
              "expr": "node_filesystem_avail_bytes{mountpoint=\"/\", fstype!=\"tmpfs\"}",
              "legendFormat": "",
              "refId": "A"
            }
          ]
        },
        {
          "id": 4,
          "type": "stat",
          "title": "Disk Used",
          "datasource": { "type": "prometheus", "uid": "VictoriaMetrics" },
          "gridPos": { "h": 4, "w": 6, "x": 6, "y": 5 },
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "color": { "mode": "fixed", "fixedColor": "blue" }
            }
          },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background", "graphMode": "none" },
          "targets": [
            {
              "expr": "node_filesystem_size_bytes{mountpoint=\"/\", fstype!=\"tmpfs\"} - node_filesystem_avail_bytes{mountpoint=\"/\", fstype!=\"tmpfs\"}",
              "legendFormat": "",
              "refId": "A"
            }
          ]
        },
        {
          "id": 5,
          "type": "timeseries",
          "title": "Disk Used Over Time",
          "datasource": { "type": "prometheus", "uid": "VictoriaMetrics" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 1 },
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "custom": { "lineWidth": 2, "fillOpacity": 10 }
            },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "total" },
                "properties": [
                  { "id": "custom.lineStyle", "value": { "dash": [10, 10], "fill": "dash" } },
                  { "id": "color", "value": { "mode": "fixed", "fixedColor": "gray" } }
                ]
              }
            ]
          },
          "options": { "legend": { "displayMode": "list", "placement": "bottom" } },
          "targets": [
            {
              "expr": "node_filesystem_size_bytes{mountpoint=\"/\", fstype!=\"tmpfs\"} - node_filesystem_avail_bytes{mountpoint=\"/\", fstype!=\"tmpfs\"}",
              "legendFormat": "used",
              "refId": "A"
            },
            {
              "expr": "node_filesystem_size_bytes{mountpoint=\"/\", fstype!=\"tmpfs\"}",
              "legendFormat": "total",
              "refId": "B"
            }
          ]
        },
        {
          "id": 6,
          "type": "row",
          "title": "App Resource Usage",
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 9 }
        },
        {
          "id": 7,
          "type": "timeseries",
          "title": "CPU Usage",
          "datasource": { "type": "prometheus", "uid": "VictoriaMetrics" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 10 },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": { "lineWidth": 1, "fillOpacity": 10 }
            }
          },
          "options": { "legend": { "displayMode": "list", "placement": "bottom" } },
          "targets": [
            {
              "expr": "sum by (pod) (rate(container_cpu_usage_seconds_total{namespace=\"media\", container!=\"\"}[$__rate_interval]))",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 8,
          "type": "timeseries",
          "title": "Memory Usage",
          "datasource": { "type": "prometheus", "uid": "VictoriaMetrics" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 10 },
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "custom": { "lineWidth": 1, "fillOpacity": 10 }
            }
          },
          "options": { "legend": { "displayMode": "list", "placement": "bottom" } },
          "targets": [
            {
              "expr": "sum by (pod) (container_memory_working_set_bytes{namespace=\"media\", container!=\"\"})",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 9,
          "type": "row",
          "title": "Reliability",
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 18 }
        },
        {
          "id": 10,
          "type": "stat",
          "title": "Container Restart Count",
          "datasource": { "type": "prometheus", "uid": "VictoriaMetrics" },
          "gridPos": { "h": 6, "w": 12, "x": 0, "y": 19 },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 1 },
                  { "color": "red", "value": 5 }
                ]
              }
            }
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "colorMode": "background",
            "graphMode": "none",
            "textMode": "auto"
          },
          "targets": [
            {
              "expr": "sum by (pod) (kube_pod_container_status_restarts_total{namespace=\"media\"})",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 11,
          "type": "stat",
          "title": "Pod Status",
          "datasource": { "type": "prometheus", "uid": "VictoriaMetrics" },
          "gridPos": { "h": 6, "w": 12, "x": 12, "y": 19 },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [{ "color": "blue", "value": null }]
              }
            }
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "colorMode": "background",
            "graphMode": "none",
            "textMode": "auto"
          },
          "targets": [
            {
              "expr": "count by (phase) (kube_pod_status_phase{namespace=\"media\"} == 1)",
              "legendFormat": "{{phase}}",
              "refId": "A"
            }
          ]
        }
      ]
    }
    {% endraw %}
