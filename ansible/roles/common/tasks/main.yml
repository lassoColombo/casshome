---
- name: Ensure default route is configured via Netplan
  ansible.builtin.copy:
    dest: /etc/netplan/99-ansible-gateway.yaml
    content: |
      network:
        version: 2
        ethernets:
          eth0:
            routes:
              - to: default
                via: {{ lan_gateway }}
    mode: "0600"
    owner: root
    group: root
  notify: Apply netplan

- name: Update apt cache and upgrade packages
  ansible.builtin.apt:
    update_cache: true
    upgrade: dist
    cache_valid_time: 3600

- name: Install base packages
  ansible.builtin.apt:
    name:
      - curl
      - git
      - vim
      - yq
      - jq
      - apt-transport-https
      - ca-certificates
      - gnupg
      - qemu-guest-agent
      - tree
    state: present

- name: Enable and start qemu-guest-agent
  ansible.builtin.service:
    name: qemu-guest-agent
    enabled: true
    state: started

- name: Set timezone
  community.general.timezone:
    name: "{{ timezone }}"

- name: Disable swap immediately if enabled
  ansible.builtin.command: swapoff -a
  when: ansible_facts["swaptotal_mb"] > 0
  changed_when: true

- name: Ensure swap is commented out in /etc/fstab
  ansible.builtin.replace:
    path: /etc/fstab
    regexp: '^([^#].*?\sswap\s+.*)$'
    replace: '# \1'
