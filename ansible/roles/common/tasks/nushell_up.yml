---
- name: Check installed nushell version
  ansible.builtin.command: "{{ nushell_install_dir }}/nu --version"
  register: nushell_installed_version
  ignore_errors: true
  changed_when: false

- name: Install nushell {{ nushell_version }}
  when: >
    nushell_installed_version.rc != 0 or
    nushell_version not in nushell_installed_version.stdout
  block:
    - name: Download nushell archive
      ansible.builtin.get_url:
        url: "https://github.com/nushell/nushell/releases/download/{{ nushell_version }}/nu-{{ nushell_version }}-x86_64-unknown-linux-musl.tar.gz"
        dest: "/tmp/nu-{{ nushell_version }}.tar.gz"
        mode: "0644"

    - name: Extract nushell archive
      ansible.builtin.unarchive:
        src: "/tmp/nu-{{ nushell_version }}.tar.gz"
        dest: "/tmp"
        remote_src: true

    - name: Install nu binary
      ansible.builtin.copy:
        src: "/tmp/nu-{{ nushell_version }}-x86_64-unknown-linux-musl/nu"
        dest: "{{ nushell_install_dir }}/nu"
        owner: root
        group: root
        mode: "0755"
        remote_src: true

    - name: Clean up download artifacts
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - "/tmp/nu-{{ nushell_version }}.tar.gz"
        - "/tmp/nu-{{ nushell_version }}-x86_64-unknown-linux-musl"

- name: Add carapace apt repository
  ansible.builtin.apt_repository:
    repo: "deb [trusted=yes] https://apt.fury.io/rsteube/ /"
    state: present
    filename: carapace

- name: Install carapace-bin
  ansible.builtin.apt:
    name: carapace-bin
    state: present
    update_cache: true

- name: Add nu to /etc/shells
  ansible.builtin.lineinfile:
    path: /etc/shells
    line: "{{ nushell_install_dir }}/nu"
    state: present

- name: Set nushell as default shell for {{ nushell_user }}
  ansible.builtin.user:
    name: "{{ nushell_user }}"
    shell: "{{ nushell_install_dir }}/nu"

- name: Create nushell config directory
  ansible.builtin.file:
    path: "{{ nushell_config_dir }}"
    state: directory
    owner: "{{ nushell_user }}"
    group: "{{ nushell_user }}"
    mode: "0755"

- name: Deploy nushell config.nu
  ansible.builtin.template:
    src: nushell_config.nu.j2
    dest: "{{ nushell_config_dir }}/config.nu"
    owner: "{{ nushell_user }}"
    group: "{{ nushell_user }}"
    mode: "0644"

- name: Deploy nushell env.nu
  ansible.builtin.template:
    src: nushell_env.nu.j2
    dest: "{{ nushell_config_dir }}/env.nu"
    owner: "{{ nushell_user }}"
    group: "{{ nushell_user }}"
    mode: "0644"
