---
# Hardens SSH on the Proxmox node.
# Pre-requisite: run `ssh-copy-id root@192.168.1.10` first to install your SSH key.
- name: Harden SSH on Proxmox node
  hosts: proxmox
  gather_facts: false

  tasks:
    - name: Ensure SSH authorized key is present for root
      ansible.posix.authorized_key:
        user: root
        key: "{{ lookup('file', '~/.ssh/casshome.pub') }}"
        state: present

    - name: Drop hardened sshd config
      ansible.builtin.copy:
        dest: /etc/ssh/sshd_config.d/99-hardened.conf
        content: |
          PasswordAuthentication no
          PermitRootLogin prohibit-password
          PubkeyAuthentication yes
        mode: "0600"
      notify: Restart sshd

    # The Intel I218-LM onboard NIC (e1000e driver) deadlocks its TX buffer under
    # tunneled traffic (Calico IPIP + WireGuard UDP). Disabling TSO/GSO/GRO on the
    # physical NIC and the bridge prevents the hang.
    # TODO: remove these three tasks when switching CNI away from Calico.

    - name: Drop e1000e modprobe config (Calico workaround)
      ansible.builtin.copy:
        dest: /etc/modprobe.d/e1000e.conf
        content: |
          # e1000e I218-LM NIC hang workaround - Calico IPIP + WireGuard tunnel traffic
          # causes TX buffer deadlock. Remove this file when switching CNI away from Calico.
          options e1000e InterruptThrottleRate=0
        mode: "0644"

    - name: Disable TSO/GSO/GRO on boot (Calico workaround)
      ansible.builtin.lineinfile:
        path: /etc/network/interfaces
        regexp: "^iface {{ item }} inet"
        line: "iface {{ item }} inet manual\n    post-up ethtool -K {{ item }} tso off gso off gro off"
        state: present
      loop:
        - nic0
        - vmbr0
      notify: Restart networking

    - name: Apply TSO/GSO/GRO disabling immediately on nic0 (Calico workaround)
      ansible.builtin.command:
        cmd: ethtool -K nic0 tso off gso off gro off
      changed_when: true

    - name: Apply TSO/GSO/GRO disabling immediately on vmbr0 (Calico workaround)
      ansible.builtin.command:
        cmd: ethtool -K vmbr0 tso off gso off gro off
      changed_when: true

  handlers:
    - name: Restart sshd
      ansible.builtin.service:
        name: sshd
        state: restarted
