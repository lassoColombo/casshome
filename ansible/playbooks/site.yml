---
- name: Infrastructure - Proxmox
  hosts: proxmox
  become: true
  roles:
    - role: proxmox
  tags: [proxmox, infra]

- name: Kubernetes - Host & Cluster Layer
  hosts: k8s
  become: true
  roles:
    - role: common
      tags: [common]
    - role: k8s
      tags: [k8s, cluster]
  tags: [k8s]

- name: Network - Gateway Layer
  hosts: gateway
  tags: [gateway]
  become: true
  module_defaults:
    kubernetes.core.k8s:
      kubeconfig: "{{ local_kubeconfig }}"
  tasks:
    - name: Label Node as Gateway
      tags: [gateway]
      delegate_to: localhost
      become: false
      kubernetes.core.k8s:
        kubeconfig: "{{ local_kubeconfig }}"
        kind: Node
        name: "{{ inventory_hostname }}"
        definition:
          metadata:
            labels:
              network-role: gateway

    - name: Import DuckDNS and Wireguard
      tags: [gateway, wireguard]
      ansible.builtin.include_role:
        name: "{{ item }}"
      loop:
        - duckdns
        - wireguard

- name: Apps - Media Stack Layer
  hosts: media
  become: true
  tags: [media]
  module_defaults:
    kubernetes.core.k8s:
      kubeconfig: "{{ local_kubeconfig }}"
  tasks:
    - name: Label Node as Media
      delegate_to: localhost
      become: false
      kubernetes.core.k8s:
        kind: Node
        name: "{{ inventory_hostname }}"
        definition:
          metadata:
            labels:
              stack-role: media
    - name: Deploy Media Stack
      ansible.builtin.import_role:
        name: media_stack

- name: Core - Observability Layer
  hosts: k8s
  become: true
  tags: [observability, monitoring]
  module_defaults:
    kubernetes.core.k8s:
      kubeconfig: "{{ local_kubeconfig }}"
  tasks:
    - name: Deploy Observability Stack
      ansible.builtin.import_role:
        name: observability
