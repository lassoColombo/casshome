---
# Deploy WireGuard VPN on the gateway node and k8s cluster.
#
# Usage:
#   ansible-playbook playbooks/wireguard.yml -i inventory/hosts.yml
#
# Prerequisites:
#   - k8s cluster is up (run site.yml first)
#   - kubernetes.core collection: ansible-galaxy collection install kubernetes.core
#   - kubeconfig at ~/.kube/casshome.conf

- name: WireGuard host prerequisites
  hosts: gateway
  become: true

  roles:
    - wireguard

- name: WireGuard VPN (k8s manifests)
  hosts: localhost
  connection: local
  gather_facts: false
  become: false
  vars_files:
    - "{{ playbook_dir }}/../inventory/group_vars/all.yml"
  vars:
    manifest_dir: "{{ playbook_dir }}/../../k8s/wireguard"
  module_defaults:
    kubernetes.core.k8s:
      kubeconfig: "~/.kube/casshome.conf"

  tasks:
    - name: Namespace
      kubernetes.core.k8s:
        src: "{{ manifest_dir }}/00-namespace.yml"
        state: present

    - name: WireGuard config secret
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: wireguard-config
            namespace: wireguard
          stringData:
            wg0.conf: |
              [Interface]
              Address = 10.13.13.1/24
              ListenPort = 51820
              PrivateKey = {{ lookup('env', 'WG_SERVER_PRIVATE_KEY') }}
              PostUp = iptables -A FORWARD -i %i -j ACCEPT; iptables -A FORWARD -o %i -j ACCEPT; iptables -t nat -A POSTROUTING -o $(ip route | awk '/default/ { print $5; exit }') -j MASQUERADE
              PostDown = iptables -D FORWARD -i %i -j ACCEPT; iptables -D FORWARD -o %i -j ACCEPT; iptables -t nat -D POSTROUTING -o $(ip route | awk '/default/ { print $5; exit }') -j MASQUERADE

              [Peer]
              # peer1
              PublicKey = {{ lookup('env', 'WG_PEER1_PUBLIC_KEY') }}
              PresharedKey = {{ lookup('env', 'WG_PEER1_PRESHARED_KEY') }}
              AllowedIPs = 10.13.13.2/32

    - name: Storage (PV and PVC)
      kubernetes.core.k8s:
        definition: "{{ lookup('file', manifest_dir + '/01-storage.yml') | from_yaml_all | list }}"
        state: present

    - name: Deployment
      kubernetes.core.k8s:
        definition: "{{ lookup('template', manifest_dir + '/02-deployment.yml.j2') | from_yaml }}"
        state: present
        wait: true
        wait_condition:
          type: Available
          status: "True"
        wait_timeout: 120

    - name: Service
      kubernetes.core.k8s:
        src: "{{ manifest_dir }}/03-service.yml"
        state: present

    - name: NetworkPolicy
      kubernetes.core.k8s:
        src: "{{ manifest_dir }}/04-networkpolicy.yml"
        state: present
