---
# Deploy the full media stack: QBittorrent, Prowlarr, Lidarr, and Jellyfin.
# All services run in the `media` namespace and share storage volumes where needed.
#
# Download pipeline:
#   Prowlarr (indexers) → Lidarr (requests) → QBittorrent (downloads to /mnt/downloads)
#   → Lidarr (imports to /mnt/media/music) → Jellyfin (serves from /media/music)
#
# Usage:
#   ansible-playbook playbooks/media-stack.yml -i inventory/hosts.yml

- name: Media stack host prerequisites
  hosts: k8s
  become: true

  tasks:
    - name: Create downloads directory
      ansible.builtin.file:
        path: /mnt/downloads
        state: directory
        mode: "0755"
        owner: ubuntu
        group: ubuntu

    - name: Create music library directory
      ansible.builtin.file:
        path: /mnt/media/music
        state: directory
        mode: "0755"
        owner: ubuntu
        group: ubuntu

- name: Media stack (k8s manifests)
  hosts: localhost
  connection: local
  gather_facts: false
  become: false
  vars_files:
    - "{{ playbook_dir }}/../inventory/group_vars/all.yml"
  vars:
    media_dir: "{{ playbook_dir }}/../../k8s/media"
  module_defaults:
    kubernetes.core.k8s:
      kubeconfig: "~/.kube/casshome.conf"

  tasks:
    # ── Common ────────────────────────────────────────────────────────────

    - name: Namespace
      kubernetes.core.k8s:
        src: "{{ media_dir }}/namespace.yml"
        state: present

    - name: Media stack storage (PVs and PVCs)
      kubernetes.core.k8s:
        definition: "{{ lookup('file', media_dir + '/storage.yml') | from_yaml_all | list }}"
        state: present

    # ── QBittorrent ───────────────────────────────────────────────────────────────

    - name: QBittorrent storage (PVs and PVCs)
      kubernetes.core.k8s:
        definition: "{{ lookup('file', media_dir + '/qbittorrent/storage.yml') | from_yaml_all | list }}"
        state: present

    - name: QBittorrent config
      kubernetes.core.k8s:
        src: "{{ media_dir }}/qbittorrent/config.yml"
        state: present

    - name: QBittorrent deployment
      kubernetes.core.k8s:
        definition: "{{ lookup('template', media_dir + '/qbittorrent/deployment.yml.j2') | from_yaml }}"
        state: present
        wait: true
        wait_condition:
          type: Available
          status: "True"
        wait_timeout: 120

    - name: QBittorrent service
      kubernetes.core.k8s:
        src: "{{ media_dir }}/qbittorrent/service.yml"
        state: present

    # ── Prowlarr ───────────────────────────────────────────────────────────────

    - name: Prowlarr storage (PVs and PVCs)
      kubernetes.core.k8s:
        definition: "{{ lookup('file', media_dir + '/prowlarr/storage.yml') | from_yaml_all | list }}"
        state: present

    - name: Prowlarr config
      kubernetes.core.k8s:
        src: "{{ media_dir }}/prowlarr/config.yml.j2"
        state: present

    - name: Prowlarr deployment
      kubernetes.core.k8s:
        definition: "{{ lookup('template', media_dir + '/prowlarr/deployment.yml.j2') | from_yaml }}"
        state: present
        wait: true
        wait_condition:
          type: Available
          status: "True"
        wait_timeout: 120

    - name: Prowlarr service
      kubernetes.core.k8s:
        src: "{{ media_dir }}/prowlarr/service.yml"
        state: present

    # ── Lidarr ───────────────────────────────────────────────────────────────

    - name: Lidarr storage (PVs and PVCs)
      kubernetes.core.k8s:
        definition: "{{ lookup('file', media_dir + '/lidarr/storage.yml') | from_yaml_all | list }}"
        state: present

    - name: Lidarr config
      kubernetes.core.k8s:
        src: "{{ media_dir }}/lidarr/config.yml.j2"
        state: present

    - name: Lidarr deployment
      kubernetes.core.k8s:
        definition: "{{ lookup('template', media_dir + '/lidarr/deployment.yml.j2') | from_yaml }}"
        state: present
        wait: true
        wait_condition:
          type: Available
          status: "True"
        wait_timeout: 120

    - name: Lidarr service
      kubernetes.core.k8s:
        src: "{{ media_dir }}/lidarr/service.yml"
        state: present

    # ── jellyfin ────────────────────────────────────────────────────────────────

    - name: Jellyfin storage (PVs and PVCs)
      kubernetes.core.k8s:
        definition: "{{ lookup('file', media_dir + '/jellyfin/storage.yml') | from_yaml_all | list }}"
        state: present

    - name: Jellyfin network config
      kubernetes.core.k8s:
        src: "{{ media_dir }}/jellyfin/config.yml"
        state: present

    - name: Jellyfin deployment
      kubernetes.core.k8s:
        definition: "{{ lookup('template', media_dir + '/jellyfin/deployment.yml.j2') | from_yaml }}"
        state: present
        wait: true
        wait_condition:
          type: Available
          status: "True"
        wait_timeout: 120

    - name: Jellyfin service
      kubernetes.core.k8s:
        src: "{{ media_dir }}/jellyfin/service.yml"
        state: present

    - name: Jellyfin ingress
      kubernetes.core.k8s:
        src: "{{ media_dir }}/jellyfin/ingress.yml"
        state: present
