# Deploy the full media stack: QBittorrent, Prowlarr, Lidarr, and Jellyfin.
# All services run in the `media` namespace and share storage volumes where needed.
#
# Download pipeline:
#   Prowlarr (indexers) → Lidarr (requests) → QBittorrent (downloads to /mnt/downloads)
#   → Lidarr (imports to /mnt/media/music) → Jellyfin (serves from /media/music)
#
# Usage:
#   ansible-playbook playbooks/media-stack.yml -i inventory/hosts.yml
---
- name: Prepare Host For Media Stack
  hosts: k8s
  become: true
  tasks:
    - name: Run host-level prerequisites
      ansible.builtin.import_role:
        name: media_stack
        tasks_from: host-prerequisites.yml

- name: Deploy Media Stack to Kubernetes
  hosts: localhost
  gather_facts: false
  module_defaults:
    kubernetes.core.k8s:
      verify_ssl: false
      kubeconfig: "~/.kube/casshome.conf"

  roles:
    - role: media_stack
